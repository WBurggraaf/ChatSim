<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatSim Demo</title>
  <style>
    :root {
      --bg: #212121;
      --panel: #111315;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.09);
      --text: #f1f3f5;
      --muted: #a0a8b3;
      --accent: #10a37f;
      --accent-hover: #0c8767;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: "Segoe UI", Arial, sans-serif; background: var(--bg); color: var(--text); }
    body { display: flex; overflow: hidden; }
    aside { width: 250px; background: var(--panel); border-right: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .sidebar-list { display: flex; flex-direction: column; gap: 8px; overflow: auto; }
    .sidebar-item { width: 100%; border: 1px solid transparent; background: transparent; color: var(--muted); text-align: left; border-radius: 12px; padding: 10px; cursor: pointer; }
    .sidebar-item.active, .sidebar-item:hover { color: var(--text); background: rgba(255,255,255,0.04); border-color: rgba(16,163,127,0.25); }
    .role { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
    main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    header { height: 60px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 18px; }
    .pill { border: 1px solid var(--border); padding: 9px 14px; border-radius: 999px; }
    #messages { flex: 1; overflow: auto; padding: 24px; }
    .welcome { min-height: 100%; display: grid; place-items: center; text-align: center; color: var(--muted); }
    .welcome h2 { color: var(--text); font-size: clamp(28px, 4vw, 38px); margin: 0 0 8px; }
    .message { display: flex; gap: 12px; margin-bottom: 18px; }
    .message.user { justify-content: flex-end; }
    .avatar { width: 34px; height: 34px; display: grid; place-items: center; border-radius: 12px; background: rgba(16,163,127,.15); border: 1px solid rgba(16,163,127,.24); color: #d9fff3; font-size: 13px; font-weight: 700; }
    .bubble, .content { max-width: min(760px, 82%); border-radius: 18px; padding: 14px 16px; line-height: 1.6; }
    .bubble { background: #2f2f2f; border: 1px solid rgba(255,255,255,.05); }
    .content { background: var(--card); border: 1px solid var(--border); }
    .content p, .content ul, .content ol, .content blockquote { margin: 0 0 12px; }
    .content p:last-child, .content ul:last-child, .content ol:last-child, .content blockquote:last-child { margin-bottom: 0; }
    .content ul, .content ol { padding-left: 22px; }
    .content blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: #d7e7e3; }
    .content code { background: rgba(255,255,255,.08); border-radius: 6px; padding: 2px 6px; }
    .content pre { margin: 0 0 14px; padding: 14px 16px; border-radius: 16px; overflow: auto; background: rgba(7,10,12,.85); border: 1px solid rgba(255,255,255,.08); }
    .content pre code { background: transparent; padding: 0; border-radius: 0; display: block; color: #dce8f2; }
    .slide-ref { display: inline-block; margin-bottom: 12px; padding: 5px 10px; border-radius: 999px; border: 1px solid rgba(16,163,127,.3); background: rgba(16,163,127,.12); color: #c6f7ea; font-size: 12px; font-weight: 700; letter-spacing: .03em; }
    .media-stack, .code-stack { display: grid; gap: 12px; margin-top: 14px; }
    .media-card, .code-card { margin: 0; padding: 12px; border-radius: 18px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.08); }
    .media-card img, .media-card video { width: 100%; display: block; border-radius: 12px; background: #0c0f11; }
    .media-caption, .code-caption { margin-top: 8px; color: var(--muted); font-size: 12px; }
    .typing { display: inline-flex; gap: 6px; padding: 4px 0; }
    .typing span, .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); animation: pulse 1s infinite ease-in-out; }
    .typing span:nth-child(2) { animation-delay: .14s; }
    .typing span:nth-child(3) { animation-delay: .28s; }
    footer { border-top: 1px solid var(--border); padding: 16px 18px; }
    .progress { display: none; justify-content: space-between; align-items: center; margin-bottom: 12px; color: var(--muted); font-size: 13px; }
    .dots { display: flex; gap: 8px; flex-wrap: wrap; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,.18); }
    .dot.done { background: var(--accent); }
    .dot.current { background: #fff; }
    .controls { display: flex; gap: 12px; align-items: center; border: 1px solid var(--border); border-radius: 22px; padding: 14px 16px; background: rgba(58,58,58,.88); }
    .fake-input { flex: 1; color: var(--muted); }
    button.primary, .restart-btn, .popup-btn { border: none; border-radius: 12px; background: var(--accent); color: #fff; font-weight: 700; padding: 12px 16px; cursor: pointer; }
    button.primary:hover, .restart-btn:hover, .popup-btn:hover:not(:disabled) { background: var(--accent-hover); }
    button.primary:disabled, .popup-btn:disabled { background: rgba(255,255,255,.08); color: var(--muted); cursor: not-allowed; }
    .hint { color: var(--muted); font-size: 12px; margin-top: 10px; }
    .badge { color: #c6f7ea; font-weight: 600; }
    .popup-overlay { position: fixed; inset: 0; background: rgba(9,11,13,.76); backdrop-filter: blur(8px); display: grid; place-items: center; opacity: 0; transition: opacity .28s ease; z-index: 20; }
    .popup-overlay.visible { opacity: 1; }
    .popup-card { width: min(80vw, 1200px); min-height: min(80vh, 760px); border-radius: 28px; padding: clamp(28px, 4vw, 56px); text-align: center; display: flex; flex-direction: column; justify-content: center; background: linear-gradient(180deg, rgba(31,35,38,.98), rgba(20,22,24,.98)); border: 1px solid rgba(255,255,255,.08); transform: translateY(18px) scale(.98); transition: transform .28s ease; }
    .popup-overlay.visible .popup-card { transform: translateY(0) scale(1); }
    .robot { width: 120px; height: 120px; margin: 0 auto 18px; border-radius: 30px; position: relative; background: linear-gradient(180deg, #203241, #15212b); border: 1px solid rgba(16,163,127,.28); }
    .robot::before, .robot::after { content: ""; position: absolute; top: 40px; width: 18px; height: 18px; border-radius: 50%; background: #aef7e3; box-shadow: 0 0 18px rgba(16,163,127,.45); }
    .robot::before { left: 30px; }
    .robot::after { right: 30px; }
    .mouth { position: absolute; left: 50%; bottom: 28px; width: 42px; height: 8px; transform: translateX(-50%); border-radius: 999px; background: rgba(174,247,227,.86); }
    .robot.speaking .mouth { animation: mouth .5s infinite ease-in-out; }
    .popup-text { font-size: clamp(28px, 3.8vw, 56px); line-height: 1.15; margin-bottom: 22px; text-wrap: balance; }
    .status { display: inline-flex; align-items: center; gap: 8px; color: var(--muted); margin-bottom: 18px; }
    .message.popup { justify-content: center; }
    .popup-inline { width: min(900px, 100%); padding: 22px 24px; border-radius: 24px; text-align: center; background: linear-gradient(180deg, rgba(31,35,38,.92), rgba(20,22,24,.92)); border: 1px solid rgba(255,255,255,.08); }
    .popup-inline .popup-text { font-size: clamp(20px, 2.6vw, 34px); margin-bottom: 0; }
    @keyframes pulse { 0%,100% { opacity:.35; transform: translateY(0); } 50% { opacity:1; transform: translateY(-1px); } }
    @keyframes mouth { 0%,100% { transform: translateX(-50%) scaleY(1); } 50% { transform: translateX(-50%) scaleY(2.4); } }
    @media (max-width: 900px) { body { flex-direction: column; } aside { width: 100%; max-height: 190px; border-right: none; border-bottom: 1px solid var(--border); } .popup-card { width: 92vw; min-height: 70vh; } .popup-text { font-size: clamp(24px, 6vw, 38px); } }
  </style>
</head>
<body>
  <aside>
    <div>ChatSim Presentation</div>
    <div class="sidebar-list" id="sidebar"></div>
  </aside>
  <main>
    <header>
      <div id="demo-title">AI Business Strategy</div>
      <div class="pill" id="model-label">ChatGPT 4o</div>
    </header>
    <div id="messages"></div>
    <footer>
      <div class="progress" id="progress"><div class="dots" id="dots"></div><span id="progress-label"></span></div>
      <div class="controls" id="controls"><span class="fake-input" id="fake-input">Ask ChatGPT anything...</span><button class="primary" id="continue-btn" type="button">Start Demo</button></div>
      <div class="hint">Press Space or Right Arrow to advance. Press R to restart.</div>
    </footer>
  </main>
  <script>
    const chatData = {
      demoTitle: "Spotting Digital Waste in Code gives you energy",
      model: "ChatGPT 4o",
      thinkingDelay: 2200,
      messageDelay: 500,
      steps: [
        { role: "popup", content: "This demo now follows your slide deck like a GenAI conversation. It keeps the chat feel, but the story, visuals, code, and examples come from the PowerPoint." },
        { role: "user", content: "Can you walk me through the presentation as if the talk itself is a live GenAI chat?" },
        { role: "assistant", slide: "Slides 4-5 | Agenda", content: `Yes. The deck naturally breaks into four acts:\n\n1. **Inzicht & Bewustwording**\nLearn to notice digital waste the same way you learn to notice litter in nature.\n\n2. **Dialoog & Perspectief**\nShift the conversation from raw energy metrics to the quality of workloads and execution behaviour.\n\n3. **Kaders & Keuzes**\nDecide when something is waste, when it is a trade-off, and what action belongs on the backlog.\n\n4. **Aan de slag**\nEnd with concrete questions the audience can take back to their own systems.\n\nThat makes the chat flow feel like a guided investigation rather than a linear slide dump.` },
        { role: "user", content: "How do you make the audience feel what spotting really means?" },
        { role: "assistant", slide: "Slides 7-17 | Spotting in de natuur", content: `You start with an analogy. People first learn to spot what they care about.\n\nIn the deck, Freek goes into nature looking for rare birds. Once you train your eyes, you begin to notice patterns. Then the twist lands: after learning to look carefully, you also start to notice **waste**.\n\nThat is the bridge to software. Digital waste is often invisible at first because:\n\n- habit makes teams blind\n- ownership is diffuse: "not my problem"\n- the cost stays abstract until it compounds\n\nSo the opening section teaches the audience a mental move: **first see it, then name it, then act on it.**`, media: [
          { type: "video", src: ".pptx_extract/ppt/media/media1.mp4", caption: "Embedded intro clip from the deck." },
          { type: "image", src: ".pptx_extract/ppt/media/image28.jpeg", caption: "The nature-to-waste visual pivot from the opening story." }
        ] },
        { role: "user", content: "Once they can see it, how do you explain the cost?" },
        { role: "assistant", slide: "Slides 18-30 | Kosten zonder waarde", content: `The next move is to make waste concrete.\n\nYou connect visible waste in the physical world to invisible waste in digital systems. The deck does that through a tree-value example, then broadens into electricity context and finally lands on a simple definition:\n\n> **Digital Waste = kosten zonder waarde**\n\nFrom there, the slides make two points very clearly:\n\n- low utilisation still consumes meaningful energy\n- consolidating underused workloads reduces both cost and emissions\n\nThe VM example is especially strong because it translates utilisation into something operationally familiar: three 25% workloads consolidated into one 75% workload means lower annual cost and lower yearly energy use.`, media: [
          { type: "image", src: ".pptx_extract/ppt/media/image34.png", caption: "Electricity Maps screenshot used to ground the discussion in real energy context." }
        ] },
        { role: "user", content: "What practical signals do you give engineers so this does not stay abstract?" },
        { role: "assistant", slide: "Slides 31-39 | Signalen en typen", content: `You give them diagnostic signals first, then waste categories.\n\n**Three signals**\n- Lots of capacity, little real usage\n- The system feels slow while CPU is not saturated\n- One component is maxed out while the rest is idle\n\n**Four types of digital waste**\n- resources running without useful work\n- structural overcapacity\n- configuration choices repeated from habit\n- hidden compute that adds no business value\n\nThis is a good point in the chat to reinforce that waste is not only about idle servers. It also shows up as waiting, imbalance, avoidable background work, and inherited defaults.` },
        { role: "user", content: "Where do you connect this to software architecture and technical debt?" },
        { role: "assistant", slide: "Slides 40-47 | Link met tech debt", content: `The tech-debt section says the quiet part out loud: waste persists because systems become tightly coupled and expensive to change.\n\nYou describe a recognisable failure mode:\n\n- one change forces five more changes\n- testing takes longer\n- faults ripple across components\n- replacing old solutions becomes risky\n\nThat matters for green software engineering because digital waste is often **maintained by design friction**. Teams keep dragging inefficient choices forward because changing them has become too expensive.\n\nSo the deck links waste to a deeper root cause: not just poor runtime behaviour, but architectures that make better behaviour harder to introduce.` },
        { role: "user", content: "How do you shift the conversation from saving energy to workload quality?" },
        { role: "assistant", slide: "Slides 49-53 | Kwaliteit van workloads", content: `This is one of the strongest pivots in the deck.\n\nInstead of asking **"How do we save electricity?"**, you ask **"Is this workload healthy, efficient, and valuable?"**\n\nThat framing is useful because engineers can reason about workload quality immediately. They understand utilisation, waiting, data movement, bottlenecks, and underused resources. Sustainability then becomes an engineering consequence of better workload design, not a separate moral layer.\n\nThe workload-quality visuals help show why utilisation matters: power use does not fall linearly with utilisation, so badly used infrastructure can stay surprisingly expensive in both cost and energy terms.`, media: [
          { type: "image", src: ".pptx_extract/ppt/media/image42.png", caption: "Power-versus-utilisation graphic from the workload quality section." }
        ] },
        { role: "user", content: "Where does the code example enter the story?" },
        { role: "assistant", slide: "Slides 54-66 | Only 40 lines of code", content: `The deck then narrows from infrastructure and workloads down to code-level waste.\n\nYou use the OpenJDK thread CPU time example as a perfect case study because it is compact, measurable, and surprising. The message is:\n\n- a tiny implementation detail can create a huge performance gap\n- runtime behaviour matters more than source-code size\n- GenAI can help inspect unfamiliar code and surface likely bottlenecks quickly\n\nThe narrative arc here is strong: start from a bug report, examine the old approach, identify where the waste comes from, compare an alternative design, and then show the resulting improvement.`, media: [
          { type: "image", src: ".pptx_extract/ppt/media/image47.png", caption: "The OpenJDK issue showing the 30x-400x slowdown problem statement." },
          { type: "image", src: ".pptx_extract/ppt/media/image50.png", caption: "External reference used in the deck to frame the 40-line fix story." }
        ] },
        { role: "user", content: "Show me how the deck presents the waste in the old implementation." },
        { role: "assistant", slide: "Slides 67-69 | Oude implementatie", content: `The old implementation repeatedly walks through **procfs** and parses text just to read thread CPU time.\n\nThat is the key teaching moment. The waste is not in a giant algorithm. It is in a small chain of operations that looks innocent in code review but is expensive at runtime:\n\n- open a proc file\n- read kernel-formatted text into user space\n- search through the string\n- parse multiple numbers with \`sscanf\`\n\nThe deck explicitly calls out \`fopen\`, \`fread\`, and \`sscanf\` as energy-heavy or micro-op-heavy blocks because they trigger syscalls, data copies, formatting, and branch-heavy parsing.`, media: [
          { type: "image", src: ".pptx_extract/ppt/media/image52.png", caption: "Original OpenJDK code path reading `/proc/self/task/%d/stat`." },
          { type: "image", src: ".pptx_extract/ppt/media/image54.png", caption: "Profile view highlighting expensive work inside the old path." }
        ], code: [
          {
            language: "cpp",
            caption: "Old procfs-based path reconstructed from the code slides.",
            content: `static jlong user_thread_cpu_time(Thread* thread) {
  pid_t tid = thread->osthread()->thread_id();
  char* s;
  char stat[2048];
  size_t statlen;
  char proc_name[64];
  int count;
  long sys_time, user_time;
  char cdummy;
  int idummy;
  long ldummy;
  FILE* fp;

  os::snprintf_checked(proc_name, 64, "/proc/self/task/%d/stat", tid);
  fp = os::fopen(proc_name, "r");
  if (fp == nullptr) return -1;

  statlen = fread(stat, 1, 2047, fp);
  stat[statlen] = '\\0';
  fclose(fp);

  s = strrchr(stat, ')');
  if (s == nullptr) return -1;
  do { s++; } while (s && isspace((unsigned char)*s));

  count = sscanf(s, "%c %d %d %d %d %d %lu %lu %lu %lu %lu %lu %lu",
    &cdummy, &idummy, &idummy, &idummy, &idummy, &idummy,
    &ldummy, &ldummy, &ldummy, &ldummy, &ldummy,
    &user_time, &sys_time);

  if (count != 13) return -1;
  return (jlong)user_time * (1000000000 / os::Posix::clock_tics_per_second());
}`
          }
        ] },
        { role: "user", content: "And what is the better path you show afterwards?" },
        { role: "assistant", slide: "Slides 70-72 | Betere implementatie", content: `The improved version avoids procfs entirely and asks the kernel for the right clock directly.\n\nThat removes file opens, string parsing, and most of the avoidable data movement. The result is conceptually cleaner and operationally cheaper.\n\nThe deck positions this as a great GenAI exercise: given the old code and a runtime model, could an assistant predict that direct clock queries would beat a procfs-based design? That is exactly the kind of unfamiliar-code reasoning you want the audience to imagine using in their own work.`, media: [
          { type: "image", src: ".pptx_extract/ppt/media/image62.png", caption: "Replacement implementation using direct thread clock access." },
          { type: "image", src: ".pptx_extract/ppt/media/image63.png", caption: "Outcome slide showing the drop from microseconds to nanoseconds." }
        ], code: [
          {
            language: "cpp",
            caption: "The optimized path shown in the later code slides.",
            content: `static bool get_thread_clockid(Thread* thread, clockid_t* clockid, bool total) {
  constexpr clockid_t CLOCK_TYPE_MASK = 3;
  constexpr clockid_t CPUCLOCK_VIRT = 1;

  int rc = pthread_getcpuclockid(thread->osthread()->pthread_id(), clockid);
  if (rc != 0) {
    assert_status(rc == ESRCH, rc, "pthread_getcpuclockid failed");
    return false;
  }

  if (!total) {
    *clockid = (*clockid & ~CLOCK_TYPE_MASK) | CPUCLOCK_VIRT;
  }

  return true;
}

static jlong user_thread_cpu_time(Thread* thread) {
  clockid_t clockid;
  bool success = get_thread_clockid(thread, &clockid, false);
  return success ? os::Linux::thread_cpu_time(clockid) : -1;
}`
          }
        ] },
        { role: "user", content: "How do you turn all of this into backlog work instead of a nice conference insight?" },
        { role: "assistant", slide: "Slides 74-79 | Naar de backlog", content: `The deck is very practical here. You tell the audience not to backlog vague technical clean-up. Backlog **outcomes** instead.\n\nExamples from the slides:\n\n- attach each waste item to euro-per-year impact\n- estimate energy or CO2 effect\n- include performance impact and risk\n- start with safe quick wins such as consolidation and right-sizing\n- reserve explicit delivery capacity, otherwise MVP pressure wins every time\n\nThe important management insight is that Product Owners prioritise outcomes, not infrastructure wording. So you translate waste into cost reduction, performance gain, or risk reduction.` },
        { role: "user", content: "What framework do you leave them with for making decisions?" },
        { role: "assistant", slide: "Slides 80-88 | Kaders en keuzes", content: `You leave the audience with three frames and one action model.\n\n**Frames**\n- Value: who uses this, what value does it create, what happens if we turn it off?\n- Cost: euro per year, energy or CO2, performance impact, operational complexity\n- Exception: is this a deliberate trade-off for compliance, resilience, peak load, or strategic flexibility?\n\n**ABCD actions**\n- **Afbouwen**: remove or switch off\n- **Bundelen**: consolidate or right-size\n- **Calibreren**: tune configuration or fix behaviour\n- **Dispensatie**: keep it intentionally, with an owner\n\nThat gives the talk a clean ending: not every inefficient thing must disappear, but every costly thing should become a conscious decision.` },
        { role: "user", content: "How do you close the talk so the audience leaves with momentum?" },
        { role: "assistant", slide: "Slides 89-92 | Aan de slag", content: `The final slides turn the room back onto itself with simple, useful questions:\n\n- What are you already doing around Sustainable IT?\n- What is blocking progress right now?\n- Which application has the most users, the most compute hours, or the highest cost?\n\nThat works well because it avoids a moral ending. Instead, the session closes with an engineering challenge: pick one meaningful workload, inspect it, find digital waste, and convert that insight into an owned improvement.`, media: [
          { type: "image", src: ".pptx_extract/ppt/media/image64.png", caption: "Closing QR code from the deck." }
        ] },
        { role: "popup", content: "That is the deck as a chat experience: learn to see waste, relate it to workload quality, inspect real code, and leave with backlog-ready actions." }
      ]
    };

    const State = Object.freeze({ IDLE: "idle", THINKING: "thinking", STREAMING: "streaming", POPUP: "popup", COMPLETE: "complete" });
    const messages = document.getElementById("messages");
    const sidebar = document.getElementById("sidebar");
    const continueBtn = document.getElementById("continue-btn");
    const progress = document.getElementById("progress");
    const dots = document.getElementById("dots");
    const progressLabel = document.getElementById("progress-label");
    const fakeInput = document.getElementById("fake-input");
    const controls = document.getElementById("controls");
    document.getElementById("demo-title").textContent = chatData.demoTitle;
    document.getElementById("model-label").textContent = chatData.model;

    let step = 0;
    let appState = State.IDLE;
    let thinkTimer = null;
    let popupTimer = null;
    let popupReadyTimer = null;
    let streamTimer = null;
    let currentStreamId = 0;
    let sidebarFocusIndex = null;

    const clearTimer = (timer) => { if (timer) clearTimeout(timer); return null; };
    const scrollBottom = () => requestAnimationFrame(() => { messages.scrollTop = messages.scrollHeight; });
    const esc = (text) => text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const attr = (text) => esc(String(text)).replace(/"/g, "&quot;");
    const inline = (text) => text.replace(/\*\*\*(.+?)\*\*\*/g, "<strong><em>$1</em></strong>").replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>").replace(/\*(.+?)\*/g, "<em>$1</em>").replace(/`([^`]+)`/g, "<code>$1</code>");
    const truncate = (text, max = 58) => text.length <= max ? text : `${text.slice(0, max - 3).trimEnd()}...`;

    function renderMarkdown(raw) {
      const lines = raw.split("\n");
      const out = [];
      let i = 0;
      const isList = (line) => /^[-*] /.test(line) || /^\d+\.\s/.test(line);
      const isBlock = (line) => /^[#>]/.test(line) || isList(line);
      while (i < lines.length) {
        const t = lines[i].trim();
        if (!t) { i += 1; continue; }
        if (t.startsWith("> ")) { out.push(`<blockquote>${inline(esc(t.slice(2)))}</blockquote>`); i += 1; continue; }
        if (/^[-*] /.test(t)) {
          const items = [];
          while (i < lines.length && /^[-*] /.test(lines[i].trim())) { items.push(`<li>${inline(esc(lines[i].trim().replace(/^[-*] /, "")))}</li>`); i += 1; }
          out.push(`<ul>${items.join("")}</ul>`);
          continue;
        }
        if (/^\d+\.\s/.test(t)) {
          const items = [];
          while (i < lines.length && /^\d+\.\s/.test(lines[i].trim())) { items.push(`<li>${inline(esc(lines[i].trim().replace(/^\d+\.\s+/, "")))}</li>`); i += 1; }
          out.push(`<ol>${items.join("")}</ol>`);
          continue;
        }
        const para = [];
        while (i < lines.length) {
          const current = lines[i].trim();
          if (!current || isBlock(current)) break;
          para.push(inline(esc(lines[i])));
          i += 1;
        }
        out.push(`<p>${para.join("<br>")}</p>`);
      }
      return out.join("\n");
    }

    function renderMedia(media = []) {
      if (!media.length) return "";
      const cards = media.map((item) => {
        const caption = item.caption ? `<div class="media-caption">${esc(item.caption)}</div>` : "";
        if (item.type === "video") {
          return `<figure class="media-card"><video controls preload="metadata" src="${attr(item.src)}"></video>${caption}</figure>`;
        }
        return `<figure class="media-card"><img src="${attr(item.src)}" alt="${attr(item.alt || item.caption || "slide media")}">${caption}</figure>`;
      });
      return `<div class="media-stack">${cards.join("")}</div>`;
    }

    function renderCode(code = []) {
      const blocks = Array.isArray(code) ? code : [code];
      const validBlocks = blocks.filter(Boolean);
      if (!validBlocks.length) return "";
      const cards = validBlocks.map((block) => {
        const caption = block.caption ? `<div class="code-caption">${esc(block.caption)}</div>` : "";
        return `<figure class="code-card"><pre><code>${esc(block.content || "")}</code></pre>${caption}</figure>`;
      });
      return `<div class="code-stack">${cards.join("")}</div>`;
    }

    function renderAssistantText(text, slide) {
      const slideRef = slide ? `<div class="slide-ref">${esc(slide)}</div>` : "";
      return `${slideRef}${renderMarkdown(text || "")}`;
    }

    function renderAssistantFull(item) {
      return `${renderAssistantText(item.content || "", item.slide)}${renderMedia(item.media)}${renderCode(item.code)}`;
    }

    function popupInner(item, inlineCard = false) {
      const button = inlineCard ? "" : `<div><button class="popup-btn" id="popup-btn" type="button" disabled>Continue</button></div>`;
      return `<div class="${inlineCard ? "popup-inline" : "popup-card"}"><div class="robot speaking" id="popup-robot"><div class="mouth"></div></div><div class="popup-text">${esc(item.content)}</div>${inlineCard ? "" : `<div class="status"><span class="status-dot" id="popup-status-dot"></span><span id="popup-status-text">Presenting...</span></div>${button}`}</div>`;
    }

    function setButton(label, disabled) {
      continueBtn.textContent = label;
      continueBtn.disabled = disabled;
    }

    function syncSidebar() {
      const activeIndex = sidebarFocusIndex ?? Math.min(step, chatData.steps.length - 1);
      [...sidebar.children].forEach((item, index) => item.classList.toggle("active", index === activeIndex));
    }

    function syncProgress() {
      dots.innerHTML = "";
      chatData.steps.forEach((_, index) => {
        const dot = document.createElement("span");
        dot.className = "dot";
        if (index < step) dot.classList.add("done");
        else if (index === step) dot.classList.add("current");
        dots.appendChild(dot);
      });
      const users = chatData.steps.filter((item) => item.role === "user").length;
      const seenUsers = chatData.steps.slice(0, step).filter((item) => item.role === "user").length;
      progressLabel.textContent = `${seenUsers} / ${users}`;
      syncSidebar();
    }

    function syncInputState() {
      if (appState === State.POPUP) return;
      if (step >= chatData.steps.length) {
        setButton("Complete", true);
        fakeInput.textContent = "Demo complete";
        return;
      }
      setButton("Continue", false);
      fakeInput.textContent = "Ask ChatGPT anything...";
    }

    function buildSidebar() {
      sidebar.innerHTML = "";
      chatData.steps.forEach((item, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "sidebar-item";
        button.innerHTML = `<span class="role">${item.role}</span><span>${index + 1}. ${truncate(item.content.replace(/\s+/g, " "))}</span>`;
        button.addEventListener("click", () => jumpToStep(index));
        sidebar.appendChild(button);
      });
    }

    function showWelcome() {
      messages.innerHTML = `<div class="welcome"><div><h2>What can I help with?</h2><p>Press <strong>Start Demo</strong> to begin the conversation.</p></div></div>`;
    }

    function appendUser(text) {
      const el = document.createElement("div");
      el.className = "message user";
      el.innerHTML = `<div class="bubble">${esc(text)}</div>`;
      messages.appendChild(el);
      scrollBottom();
    }

    function appendPopupInline(item) {
      const el = document.createElement("div");
      el.className = "message popup";
      el.innerHTML = popupInner(item, true);
      messages.appendChild(el);
      scrollBottom();
    }

    function showTyping() {
      const el = document.createElement("div");
      el.className = "message";
      el.id = "typing-bubble";
      el.innerHTML = `<div class="avatar">AI</div><div class="content"><div class="typing"><span></span><span></span><span></span></div></div>`;
      messages.appendChild(el);
      scrollBottom();
      const current = chatData.steps[step];
      thinkTimer = setTimeout(() => revealAssistant(current), current.thinkingDelay ?? chatData.thinkingDelay);
    }

    function revealAssistant(item) {
      const content = item.content || "";
      document.getElementById("typing-bubble")?.remove();
      const wrapper = document.createElement("div");
      wrapper.className = "message";
      wrapper.innerHTML = `<div class="avatar">AI</div><div class="content"></div>`;
      messages.appendChild(wrapper);
      const contentEl = wrapper.querySelector(".content");
      const tokens = content.match(/\S+\s*/g) || [content];
      const streamId = ++currentStreamId;
      let index = 0;
      let rendered = "";
      let snapshot = "";
      appState = State.STREAMING;
      setButton("Writing...", true);
      fakeInput.textContent = `${chatData.model} is responding...`;
      function tick() {
        if (streamId !== currentStreamId) return;
        rendered += tokens[index];
        index += 1;
        if (rendered !== snapshot) {
          snapshot = rendered;
          contentEl.innerHTML = renderAssistantText(rendered, item.slide);
          scrollBottom();
        }
        if (index >= tokens.length) {
          contentEl.innerHTML = renderAssistantFull(item);
          step += 1;
          appState = State.IDLE;
          syncProgress();
          syncInputState();
          if (step >= chatData.steps.length) completeDemo();
          return;
        }
        const trimmed = tokens[index - 1].trim();
        const delay = /[.!?]$/.test(trimmed) ? 110 : /[,;:]$/.test(trimmed) ? 70 : 34;
        streamTimer = setTimeout(tick, delay);
      }
      tick();
    }

    function stopStreaming() {
      currentStreamId += 1;
      thinkTimer = clearTimer(thinkTimer);
      streamTimer = clearTimer(streamTimer);
      document.getElementById("typing-bubble")?.remove();
    }

    function popupDelay(text) {
      const words = text.trim().split(/\s+/).filter(Boolean).length;
      return Math.max(1400, Math.min(3200, 700 + words * 180));
    }

    function showPopup(item) {
      const overlay = document.createElement("div");
      overlay.className = "popup-overlay";
      overlay.id = "popup-overlay";
      overlay.innerHTML = popupInner(item);
      document.body.appendChild(overlay);
      requestAnimationFrame(() => overlay.classList.add("visible"));
      const robot = overlay.querySelector("#popup-robot");
      const statusDot = overlay.querySelector("#popup-status-dot");
      const statusText = overlay.querySelector("#popup-status-text");
      const popupBtn = overlay.querySelector("#popup-btn");
      popupBtn.addEventListener("click", dismissPopup);
      popupReadyTimer = clearTimer(popupReadyTimer);
      popupReadyTimer = setTimeout(() => {
        robot.classList.remove("speaking");
        statusDot.style.animation = "none";
        statusText.textContent = "Click Continue when ready";
        popupBtn.disabled = false;
        popupBtn.focus();
        popupReadyTimer = null;
      }, popupDelay(item.content));
    }

    function dismissPopup() {
      popupReadyTimer = clearTimer(popupReadyTimer);
      const overlay = document.getElementById("popup-overlay");
      if (!overlay) return;
      overlay.classList.remove("visible");
      popupTimer = clearTimer(popupTimer);
      popupTimer = setTimeout(() => {
        overlay.remove();
        popupTimer = null;
        appState = State.IDLE;
        syncInputState();
        if (step >= chatData.steps.length) completeDemo();
      }, 280);
    }

    function advance() {
      if (appState !== State.IDLE) return;
      sidebarFocusIndex = null;
      if (step >= chatData.steps.length) { completeDemo(); return; }
      progress.style.display = "flex";
      const item = chatData.steps[step];
      if (item.role === "popup") {
        appState = State.POPUP;
        appendPopupInline(item);
        step += 1;
        syncProgress();
        setButton("Waiting...", true);
        fakeInput.textContent = "Presenter moment in progress...";
        showPopup(item);
        return;
      }
      if (item.role === "user") {
        appendUser(item.content);
        step += 1;
        syncProgress();
        if (step < chatData.steps.length && chatData.steps[step].role === "assistant") {
          appState = State.THINKING;
          setButton("...", true);
          fakeInput.textContent = `${chatData.model} is thinking...`;
          thinkTimer = setTimeout(showTyping, chatData.messageDelay);
        } else {
          syncInputState();
        }
      }
    }

    function rebuildTo(targetStep) {
      showWelcome();
      if (targetStep === 0) return;
      messages.innerHTML = "";
      for (let i = 0; i < targetStep; i += 1) {
        const item = chatData.steps[i];
        if (item.role === "user") appendUser(item.content);
        if (item.role === "assistant") {
          const wrapper = document.createElement("div");
          wrapper.className = "message";
          wrapper.innerHTML = `<div class="avatar">AI</div><div class="content">${renderAssistantFull(item)}</div>`;
          messages.appendChild(wrapper);
        }
        if (item.role === "popup") appendPopupInline(item);
      }
      scrollBottom();
    }

    function jumpToStep(targetStep) {
      if (targetStep < 0 || targetStep >= chatData.steps.length) return;
      thinkTimer = clearTimer(thinkTimer);
      popupTimer = clearTimer(popupTimer);
      popupReadyTimer = clearTimer(popupReadyTimer);
      stopStreaming();
      document.getElementById("popup-overlay")?.remove();
      document.querySelectorAll(".badge, .restart-btn").forEach((el) => el.remove());
      const renderedSteps = Math.min(targetStep + 1, chatData.steps.length);
      step = renderedSteps;
      appState = State.IDLE;
      sidebarFocusIndex = targetStep;
      rebuildTo(renderedSteps);
      syncProgress();
      syncInputState();
    }

    function completeDemo() {
      if (appState === State.COMPLETE) return;
      appState = State.COMPLETE;
      setButton("Complete", true);
      fakeInput.textContent = "Demo complete";
      if (!controls.querySelector(".badge")) {
        const badge = document.createElement("span");
        badge.className = "badge";
        badge.textContent = "Demo complete";
        controls.insertBefore(badge, continueBtn);
      }
      if (!controls.querySelector(".restart-btn")) {
        const restart = document.createElement("button");
        restart.type = "button";
        restart.className = "restart-btn";
        restart.textContent = "Restart";
        restart.addEventListener("click", restartDemo);
        controls.appendChild(restart);
      }
    }

    function restartDemo() {
      thinkTimer = clearTimer(thinkTimer);
      popupTimer = clearTimer(popupTimer);
      popupReadyTimer = clearTimer(popupReadyTimer);
      stopStreaming();
      step = 0;
      appState = State.IDLE;
      sidebarFocusIndex = null;
      document.getElementById("popup-overlay")?.remove();
      document.querySelectorAll(".badge, .restart-btn").forEach((el) => el.remove());
      progress.style.display = "none";
      showWelcome();
      syncProgress();
      setButton("Start Demo", false);
      fakeInput.textContent = "Ask ChatGPT anything...";
    }

    continueBtn.addEventListener("click", advance);
    document.addEventListener("keydown", (event) => {
      if (event.key === "r" || event.key === "R") { restartDemo(); return; }
      if (event.key === " " || event.key === "ArrowRight") {
        if (event.target === continueBtn) return;
        event.preventDefault();
        advance();
      }
    });

    buildSidebar();
    showWelcome();
    syncProgress();
    setButton("Start Demo", false);
  </script>
</body>
</html>
